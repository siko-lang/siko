<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Siko — {{title}}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=JetBrains+Mono:ital,wght@0,400;0,700;1,400&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="{{style_path}}style.css">
</head>

<body>
  <div class="container">

    <p class="post-meta">{{breadcrumb}}</p>

    <div class="split split-blog">
      <div class="split-left" id="blog-nav"></div>
      <div class="split-right">
        <p class="post-meta">{{date}}</p>
        {{content}}
      </div>
    </div>

  </div>
  <script src="{{style_path}}siko-highlight.js"></script>
  <script>fetch('{{nav_path}}nav.html').then(r=>r.text()).then(h=>document.getElementById('blog-nav').innerHTML=h);</script>
</body>

</html>
