name = "SikoCompiler"
version = "0.1.0"

[dependencies]
SikoCommon = { version= "0.1.0", path = "../Common" }
Std = "0.1.0"

[native]
libs = [
  { name = "LLVM", candidates = [
    { command = "llvm-config", args = ["--libdir"] },
    { command = "/opt/homebrew/opt/llvm/bin/llvm-config", args = ["--libdir"] },
    { path = "/usr/lib/llvm-18/lib" },
    { path = "/usr/lib/llvm-17/lib" },
  ] },
]
