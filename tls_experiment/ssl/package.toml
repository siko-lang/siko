name = "TlsExperimentSsl"
version = "0.1.0"

[dependencies]
Std = "0.1.0"

[native]
libs = [
  { name = "ssl", candidates = [
    { command = "pkg-config", args = ["--variable=libdir", "openssl"] },
    { path = "/opt/homebrew/opt/openssl@3/lib" },
  ] },
  { name = "crypto", candidates = [
    { command = "pkg-config", args = ["--variable=libdir", "openssl"] },
    { path = "/opt/homebrew/opt/openssl@3/lib" },
  ] },
]
