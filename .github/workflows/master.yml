name: Master

on: [push]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v1
    - name: Rust sikoc
      run: make rust_sikoc
      working-directory: ./
    - name: Stage0
      run: make stage0
      working-directory: ./
    - name: Run tests
      run: make stage0_test
      working-directory: ./
